<!DOCTYPE html>
<html>
<style>
.letter-container {
  display: inline-block;
  position: relative;
  font-family: sans-serif;
  font-size: 8rem;
  font-weight: 900;
  line-height: 1;
}
.letter-half {
  position: absolute;
  top: 0;
  left: 0;
  overflow: hidden;
  height: 100%;
  width: 100%;
}
.letter-half span {
  display: inline-block;
  animation: meet 2s ease-out forwards;
}
.top-half {
  clip-path: inset(0 0 50% 0);
}
.top-half span {
  transform: translateY(-50%);
}
.bottom-half {
  clip-path: inset(50% 0 0 0);
}
.bottom-half span {
  transform: translateY(50%);
}
@keyframes meet {
  to { transform: translateY(0); }
}
</style>
<body>
  <div class="letter-container">
    <div class="letter-half top-half"><span>L</span></div>
    <div class="letter-half bottom-half"><span>L</span></div>
  </div>
</body>
</html>
