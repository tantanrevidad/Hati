<!DOCTYPE html>
<html>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap');
.logo-text {
  font-family: 'Nunito', sans-serif;
  font-size: 8rem;
  font-weight: 900;
  fill: transparent;
  stroke: white;
  stroke-width: 3px;
  stroke-dasharray: 500;
  stroke-dashoffset: 500;
  animation: write 2s linear forwards, fillText 0.5s linear 2s forwards;
}
@keyframes write {
  to { stroke-dashoffset: 0; }
}
@keyframes fillText {
  to { fill: white; }
}
body { background: black; }
</style>
<body>
<svg width="600" height="200" viewBox="0 0 600 200">
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" class="logo-text">
    L<tspan stroke="#10C86E" style="animation: writeGreen 2s linear forwards, fillGreen 0.5s linear 2s forwards;">i</tspan>STA
  </text>
</svg>
<style>
@keyframes writeGreen { to { stroke-dashoffset: 0; } }
@keyframes fillGreen { to { fill: #10C86E; } }
</style>
</body>
</html>
